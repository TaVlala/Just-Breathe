<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./icon.png" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#06070a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="A minimalistic, modern app for breathing exercises and mindfulness." />
    <title>Jus Breathe - Calm Meditation</title>
  </head>
  <body class="dark-mode theme-forest">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => {
              console.log('SW registered:', reg);
              // Trigger reload banner if new version is found
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      if (confirm("A new version of Jus Breathe is available. Reload now to update?")) {
                        window.location.reload();
                      }
                    }
                  };
                }
              };
            })
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
